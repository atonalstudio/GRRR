<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GRRR | Visual Test Base</title>
  <link rel="stylesheet" href="../../dist/latest/grrr.css">
  <link rel="stylesheet" href="./shared.css">
  <style id="test"></style>
</head>
<body>

  <div id="toolbar">
    <label for="test-select">Test</label>
    <select id="test-select"></select>
    <label for="width-range" id="width-label">100%</label>
    <input id="width-range" type="range" min="10" max="100" step="1">
  </div>

  <div id="info">
    <h1 id="name">—</h1>
    <p id="expects">—</p>
  </div>

  <div class="text">
    <p>This testing tool is designed for use on screens wider than 1280 pixels.</p>
  </div>

  <div id="canvas">
    <div id="container"></div>
  </div>

  <details id="css-panel">
    <summary>Applied Config</summary>
    <code id="classname"></code>
    <code id="css"></code>
  </details>

  <script src="./tests.js"></script>
  <script>
    const select    = document.getElementById('test-select');
    const nameEl    = document.getElementById('name');
    const expectsEl = document.getElementById('expects');
    const container = document.getElementById('container');
    const styleEl   = document.getElementById('test');
    const cssEl       = document.getElementById('css');
    const classnameEl = document.getElementById('classname');

    // Populate select
    tests.forEach((t, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = t.name;
      select.appendChild(opt);
    });

    function normalizeCss(css) {
      const INDENT = '  ';
      // Normalise line endings, strip all existing indentation
      const tokens = css
        .replace(/\r\n?/g, '\n')
        .replace(/\t/g, ' ')
        // ensure braces and semicolons are surrounded by newlines
        .replace(/\{/g, ' {\n')
        .replace(/\}/g, '\n}\n')
        .replace(/;/g,  ';\n')
        .split('\n')
        .map(l => l.trim())
        .filter(l => l.length > 0);

      let depth = 0;
      const lines = [];
      for (const token of tokens) {
        if (token === '}') depth = Math.max(0, depth - 1);
        lines.push(INDENT.repeat(depth) + token);
        if (token.endsWith('{')) depth++;
      }

      // collapse consecutive blank-ish separations (none were added, but just in case)
      return lines.join('\n');
    }

    function applyTest(index) {
      const t = tests[index];
      if (!t) return;

      const css  = typeof t.css  === 'function' ? t.css()  : (t.css  || '');
      const html = typeof t.html === 'function' ? t.html() : (t.html || '');

      nameEl.textContent    = t.name;
      expectsEl.textContent = t.expects;

      container.className   = t.className || '';
      container.innerHTML   = html;

      styleEl.textContent       = css;
      classnameEl.textContent   = t.className ? `.${t.className.trim().split(/\s+/).join('.')}` : '';
      cssEl.textContent         = normalizeCss(css);

      select.value = index;

      const url = new URL(location.href);
      url.searchParams.set('test', t.name);
      history.replaceState(null, '', url);
    }

    function findTestIndex(name) {
      return tests.findIndex(t => t.name === name);
    }

    select.addEventListener('change', () => applyTest(Number(select.value)));

    // ── Width slider ──
    const widthRange = document.getElementById('width-range');
    const widthLabel = document.getElementById('width-label');
    const canvas     = document.getElementById('canvas');

    function setCanvasWidth(pct) {
      canvas.style.width = pct + '%';
      canvas.style.setProperty('--dvw', pct)
      widthLabel.textContent = pct + '%';
    }

    widthRange.min   = 20;
    widthRange.max   = 100;
    widthRange.value = 100;
    widthRange.addEventListener('input', () => setCanvasWidth(Number(widthRange.value)));

    const params  = new URLSearchParams(location.search);
    const initial = findTestIndex(params.get('test') || '');
    applyTest(initial >= 0 ? initial : 0);
  </script>
</body>
</html>
